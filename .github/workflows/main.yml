name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Pre-create build folders for SPM
        run: |
          mkdir -p build/ios/SourcePackages
          mkdir -p build/macos/SourcePackages
        working-directory: ./ismp_app

      - name: Install dependencies
        run: flutter pub get
        working-directory: ./ismp_app

      - name: Fix device_info_plus visionOS compilation
        run: |
          PLUGIN_FILE=$(find ~/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" -path "*/device_info_plus*" | head -1)
          if [ -n "$PLUGIN_FILE" ]; then
            sed -i '' 's/processInfo.isiOSAppOnVision/NO/g' "$PLUGIN_FILE"
            echo "Patched: $PLUGIN_FILE"
          fi
        
      - name: Force iOS Deployment Target to 15.0
        run: sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj
        working-directory: ./ismp_app

      - name: Build iOS App (Unsigned)
        run: flutter build ios --release --no-codesign
        working-directory: ./ismp_app

      - name: Package Application into IPA
        run: |
          cd ismp_app
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -qq -r App.ipa Payload
        
      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: ismp_app/App.ipa
